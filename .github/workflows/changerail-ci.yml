name: ChangeRail CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify ChangeRail release gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js for OpenSpec wrapper
        # actions/setup-node v4
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install Python release dependencies
        run: |
          python3 -m venv .runtime/changerail/ci-venv
          .runtime/changerail/ci-venv/bin/python -m pip install --disable-pip-version-check -r requirements-dev.txt
          echo "$PWD/.runtime/changerail/ci-venv/bin" >> "$GITHUB_PATH"

      - name: OpenSpec validation
        run: ./bin/openspec validate --all --strict

      - name: Docs and config baseline
        run: |
          python3 -m json.tool .mcp.json
          python3 - <<'PY'
          import tomllib
          for path in (".codex/config.toml",):
              with open(path, "rb") as f:
                  tomllib.load(f)
          print("TOML_OK")
          PY
          git diff --check

      - name: Contract schema validation
        run: python3 scripts/smoke-contract-schemas.py

      - name: Python syntax inventory
        run: python3 scripts/compile-python-inventory.py

      - name: Python lint
        run: ruff check bin scripts

      - name: CI contract smoke
        run: python3 scripts/smoke-release-ci.py

      - name: Public surface scan
        run: |
          python3 scripts/public-surface-scan.py --self-test
          python3 scripts/public-surface-scan.py
          python3 scripts/public-surface-scan.py --history

      - name: Wiring discovery smoke
        run: python3 scripts/smoke-wiring-discovery.py

      - name: Verify-project smoke
        run: python3 scripts/smoke-verify-project.py

      - name: Bootstrap smoke
        run: python3 scripts/smoke-bootstrap-project.py

      - name: Review contract smoke
        run: |
          python3 scripts/smoke-review-verdict-validation.py
          python3 scripts/smoke-review-fingerprint.py

      - name: Delivery contract smoke
        run: |
          python3 scripts/smoke-delivery-manifest.py
          python3 scripts/smoke-delivery-manifest-derive.py
          python3 scripts/smoke-delivery-runner.py
          python3 scripts/smoke-delivery-metrics.py

      - name: OpenSpec archive diagnostics smoke
        run: python3 scripts/smoke-openspec-archive-diagnostics.py

      - name: Drift smoke with generated fixture
        run: |
          rm -rf .runtime/changerail/ci-drift
          ./bin/bootstrap-project .runtime/changerail/ci-drift/example-project \
            --name example-project \
            --kind generic
          python3 scripts/smoke-drift.py \
            --project .runtime/changerail/ci-drift/example-project
